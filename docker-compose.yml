
services:
  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - api
      - drawio
      - rustfs
    networks:
      - research_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - API_URL_INTERNAL=http://api:8000/api/v1
      - NEXT_PUBLIC_DRAWIO_BASE_URL=/drawio
      - DRAWIO_URL_INTERNAL=http://drawio:8080/draw
      - WATCHPACK_POLLING=false
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/public:/app/apps/web/public:ro
      - ./apps/web/package.json:/app/apps/web/package.json:ro
      - ./apps/web/next.config.mjs:/app/apps/web/next.config.mjs:ro
      - ./apps/web/tsconfig.json:/app/apps/web/tsconfig.json:ro
      - ./apps/web/postcss.config.mjs:/app/apps/web/postcss.config.mjs:ro
      - ./apps/web/components.json:/app/apps/web/components.json:ro
      - ./apps/web/eslint.config.mjs:/app/apps/web/eslint.config.mjs:ro
      - ./packages/types/src:/app/packages/types/src:ro
      - ./packages/types/package.json:/app/packages/types/package.json:ro
      - ./packages/types/tsconfig.json:/app/packages/types/tsconfig.json:ro
      - ./packages/sdk/src:/app/packages/sdk/src:ro
      - ./packages/sdk/package.json:/app/packages/sdk/package.json:ro
      - ./packages/sdk/tsconfig.json:/app/packages/sdk/tsconfig.json:ro
      - ./packages/vendor/excalidraw/packages/common/src:/app/packages/vendor/excalidraw/packages/common/src:ro
      - ./packages/vendor/excalidraw/packages/common/package.json:/app/packages/vendor/excalidraw/packages/common/package.json:ro
      - ./packages/vendor/excalidraw/packages/math/src:/app/packages/vendor/excalidraw/packages/math/src:ro
      - ./packages/vendor/excalidraw/packages/math/package.json:/app/packages/vendor/excalidraw/packages/math/package.json:ro
      - ./packages/vendor/excalidraw/packages/element/src:/app/packages/vendor/excalidraw/packages/element/src:ro
      - ./packages/vendor/excalidraw/packages/element/package.json:/app/packages/vendor/excalidraw/packages/element/package.json:ro
      - ./packages/vendor/excalidraw/packages/utils/src:/app/packages/vendor/excalidraw/packages/utils/src:ro
      - ./packages/vendor/excalidraw/packages/utils/package.json:/app/packages/vendor/excalidraw/packages/utils/package.json:ro
      - ./packages/vendor/excalidraw/packages/excalidraw/src:/app/packages/vendor/excalidraw/packages/excalidraw/src:ro
      - ./packages/vendor/excalidraw/packages/excalidraw/package.json:/app/packages/vendor/excalidraw/packages/excalidraw/package.json:ro
      - web_next_cache:/app/apps/web/.next
    networks:
      - research_net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./apps/api/app:/app/app:ro
      - ./excalidraw_all_with_description:/app/excalidraw_all_with_description:ro
      - ./models:/app/models:ro
      - api_data:/app/data
      - api_storage:/app/storage
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - RUSTFS_PUBLIC_ENDPOINT=
      - STORAGE_BASE=/app/storage
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_DEVICE=cuda
      - MINERU_SERVICE_URL=http://mineru:8001
      - MINERU_TIMEOUT=600
      - LOCAL_EMBEDDING_MODEL_PATH=/app/models/embedding
      - USE_LOCAL_EMBEDDINGS=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      mineru:
        condition: service_healthy
    networks:
      - research_net

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    command: celery -A app.core.celery_app worker -l info --pool=solo
    volumes:
      - ./apps/api/app:/app/app:ro
      - api_storage:/app/storage
      - api_data:/app/data
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - STORAGE_BASE=/app/storage
      - MINERU_SERVICE_URL=http://mineru:8001
      - MINERU_TIMEOUT=600
    depends_on:
      - api
      - redis
    networks:
      - research_net
    restart: unless-stopped

  mineru:
    build:
      context: ./docker/mineru
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MINERU_EXECUTABLE=python
      - MINERU_PROJECT_DIR=/app
      - MINERU_TIMEOUT=600
      - STORAGE_BASE=/app/storage
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - research_net

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - research_net

  rustfs:
    image: rustfs/rustfs:latest
    user: "0:0"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - RUSTFS_OBS_LOGGER_LEVEL=info
    volumes:
      - rustfs_data:/data/rustfs
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - research_net
    restart: unless-stopped

  redis:
    image: redis:7.2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - research_net

  drawio-image-export:
    image: jgraph/export-server
    expose:
      - "8000"
    networks:
      - research_net
    volumes:
      - ./apps/drawio/fonts:/usr/share/fonts/drawio
    env_file:
      - ./apps/drawio/.env

  drawio:
    image: jgraph/drawio
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      - drawio-image-export
    networks:
      - research_net
    environment:
      - ENABLE_DRAWIO_PROXY=1
      - DRAWIO_PROXY_ALLOWED_PORTS=9000,9001
      - DRAWIO_SELF_CONTAINED=0
      - EXPORT_URL=http://drawio-image-export:8000/
    env_file:
      - ./apps/drawio/.env

volumes:
  postgres_data:
  rustfs_data:
  redis_data:
  web_next_cache:
  api_data:
  api_storage:

networks:
  research_net:
    driver: bridge
