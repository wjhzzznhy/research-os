
services:
  gateway:
    image: nginx:alpine
    container_name: research_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/gateway/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/gateway/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
    networks:
      - research_net
    restart: always

  web:
    build: 
      context: .
      dockerfile: apps/web/Dockerfile
      target: prod
    container_name: research_web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
      - API_URL_INTERNAL=http://api:8000/api/v1
    networks:
      - research_net

  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
      target: prod
    container_name: research_api
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - RAG_DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - RUSTFS_PUBLIC_ENDPOINT=
      - STORAGE_BASE=/app/storage
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_DEVICE=cuda
      - LOCAL_EMBEDDING_MODEL_PATH=/app/models/embedding
      - USE_LOCAL_EMBEDDINGS=true
      - MINERU_SERVICE_URL=http://mineru:8001
      - MINERU_TIMEOUT=600
    volumes:
      - api_storage:/app/storage
      - api_media:/app/data/media
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      mineru:
        condition: service_healthy
    networks:
      - research_net
    restart: always

  worker:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
      target: prod
    container_name: research_worker
    command: celery -A app.core.celery_app worker -l info --pool=solo
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - RAG_DATABASE_URL=postgresql+psycopg://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - STORAGE_BASE=/app/storage
      - MINERU_SERVICE_URL=http://mineru:8001
      - MINERU_TIMEOUT=600
    volumes:
      - api_storage:/app/storage
      - api_media:/app/data/media
    depends_on:
      - api
      - redis
    networks:
      - research_net
    restart: always

  mineru:
    build:
      context: ./docker/mineru
      dockerfile: Dockerfile
    container_name: research_mineru
    restart: always
    environment:
      - MINERU_EXECUTABLE=python
      - MINERU_PROJECT_DIR=/app
      - MINERU_TIMEOUT=600
      - STORAGE_BASE=/app/storage
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - research_net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: research_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - research_net
    restart: always

  rustfs:
    image: rustfs/rustfs:latest
    container_name: research_rustfs
    user: "0:0"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${RUSTFS_USER}
      - RUSTFS_SECRET_KEY=${RUSTFS_PASSWORD}
      - RUSTFS_OBS_LOGGER_LEVEL=info
    volumes:
      - rustfs_data:/data/rustfs
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - research_net
    restart: always

  redis:
    image: redis:7.2
    container_name: research_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - research_net
    restart: always

volumes:
  postgres_data:
  rustfs_data:
  redis_data:
  api_storage:
  api_media:

networks:
  research_net:
    driver: bridge
